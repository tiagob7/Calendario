<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Tarefas</title>
<link rel="stylesheet" href="styles.css">
<style>
/* ── CSS específico de tarefas.html ── */
.page{max-width:860px;}

--gray-bg:#f4f4f6; --gray-border:#e2e2e8;
--urgent:#dc2626; --normal:#d97706; --baixa:#16a34a;

/* Stats específicas */
.stat-chip.s-progresso .stat-val{color:var(--blue);}
.stat-chip.s-urgente .stat-val{color:var(--red);}
.stat-chip.s-ok .stat-val{color:var(--green);}
.stats-gestor-row{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}

/* Painel novo pedido */
.novo-pedido-panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px 26px;margin-bottom:20px;box-shadow:0 1px 6px rgba(0,0,0,.06);}
.header-row{margin-bottom:16px;}
.header-top{display:flex;align-items:baseline;gap:16px;margin-bottom:14px;}

/* Prioridade pills */
.prio-row{display:flex;gap:6px;}
.prio-pill{flex:1;padding:7px 4px;border:1px solid var(--border);background:transparent;font-family:'DM Mono',monospace;font-size:10px;border-radius:6px;cursor:pointer;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;transition:all .15s;text-align:center;}
.prio-pill[data-p="urgente"].sel{background:var(--red-bg);border-color:var(--red);color:var(--red);}
.prio-pill[data-p="normal"].sel{background:var(--amber-bg);border-color:var(--amber);color:var(--amber);}
.prio-pill[data-p="baixa"].sel{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.prio-pill:not(.sel):hover{border-color:#aaa;color:var(--text);}

/* User info */
.user-info-avatar{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:'Manrope',sans-serif;}
.user-info-name{font-size:11px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.user-info-role{font-size:9px;text-transform:uppercase;letter-spacing:.07em;padding:2px 7px;border-radius:8px;background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border);white-space:nowrap;}

/* Sort btn */
.sort-btn{padding:5px 11px;border:1px solid var(--border);background:transparent;font-family:'DM Mono',monospace;font-size:10px;border-radius:20px;cursor:pointer;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;transition:all .15s;white-space:nowrap;}
.sort-btn.active{background:var(--text);border-color:var(--text);color:#fff;}
.filter-select{padding:5px 8px;border:1px solid var(--border);background:var(--surface2);font-family:'DM Mono',monospace;font-size:10px;border-radius:20px;color:var(--muted);outline:none;cursor:pointer;max-width:140px;}

/* Task card */
.tasks-list{display:flex;flex-direction:column;gap:6px;}
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:box-shadow .15s;position:relative;overflow:hidden;}
.task-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.09);}
.task-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:12px 0 0 12px;}
.task-card.estado-aguardar::before{background:var(--border);}
.task-card.estado-progresso::before{background:var(--blue);}
.task-card.estado-concluido::before{background:var(--green);}
.task-card.estado-cancelado::before{background:var(--red);}
.task-card.estado-pendente::before{background:var(--amber);}
.task-card.estado-concluido{opacity:.72;}
.task-card.estado-cancelado{opacity:.6;}
.card-header{display:grid;grid-template-columns:28px 1fr 120px 90px 105px 18px;align-items:center;gap:8px;padding:11px 16px;cursor:pointer;user-select:none;}
@media(max-width:768px){.card-header{grid-template-columns:28px 1fr 90px 95px 18px;}}
@media(max-width:480px){.card-header{grid-template-columns:28px 1fr 90px 18px;}}
.card-num{font-size:10px;white-space:nowrap;font-weight:600;}
.card-num.urgente{color:var(--red);}
.card-num.normal{color:var(--amber);}
.card-num.baixa{color:var(--green);}
.card-title{font-size:12px;font-weight:500;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
.card-title.done{text-decoration:line-through;color:var(--muted);}
.card-person{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right;}
@media(max-width:480px){.card-person{display:none;}}
.card-prio-col{display:flex;justify-content:flex-end;}
.card-estado-col{display:flex;justify-content:flex-end;}
@media(max-width:768px){.card-prio-col{display:none;}}
.card-body{display:none;padding:12px 16px 14px;border-top:1px solid var(--border);}
.card-body.open{display:block;}
.card-desc{font-size:11px;color:var(--muted);line-height:1.55;margin-bottom:10px;}
.card-detail-row{display:flex;align-items:center;gap:14px;font-size:10px;color:var(--muted);flex-wrap:wrap;margin-bottom:8px;}
.detail-item{display:flex;align-items:center;gap:4px;}
.detail-item svg{width:11px;height:11px;opacity:.55;}
.card-notas{margin-top:8px;font-size:10px;color:var(--muted);background:var(--surface2);border:1px dashed var(--border);border-radius:6px;padding:7px 10px;line-height:1.6;}
.card-notas-label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#bbb;margin-bottom:3px;}
.card-gestor{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.card-gestor.show{display:block;}
.card-gestor-row{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;}
.estado-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:11px;padding:6px 8px;border-radius:6px;outline:none;cursor:pointer;flex-shrink:0;}
.notas-input{flex:1;min-width:160px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:11px;padding:6px 8px;border-radius:6px;outline:none;resize:none;transition:border-color .15s;}
.notas-input:focus{border-color:var(--accent);}
.prio-tag{font-size:9px;text-transform:uppercase;letter-spacing:.08em;padding:3px 8px;border-radius:10px;font-weight:500;flex-shrink:0;}
.prio-tag.urgente{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.prio-tag.normal{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
.prio-tag.baixa{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.estado-pill{font-size:9px;text-transform:uppercase;letter-spacing:.08em;padding:3px 9px;border-radius:10px;font-weight:500;flex-shrink:0;}
.estado-pill.aguardar{background:var(--bg);color:var(--muted);border:1px solid var(--border);}
.estado-pill.progresso{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border);}
.estado-pill.concluido{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.estado-pill.cancelado{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.estado-pill.pendente{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
.escritorio-tag{font-size:9px;padding:2px 7px;border-radius:8px;border:1px solid var(--border);color:var(--muted);background:var(--surface2);white-space:nowrap;text-transform:capitalize;}

/* FILE ATTACHMENTS */
.card-files{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.files-header{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.files-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);flex:1;}
.btn-attach{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border:1px solid var(--border);border-radius:20px;font-size:10px;cursor:pointer;color:var(--muted);background:none;font-family:'DM Mono',monospace;letter-spacing:.05em;transition:all .15s;}
.btn-attach:hover{border-color:var(--accent);color:var(--accent);}
.btn-attach input[type=file]{display:none;}
.file-item{display:flex;align-items:center;gap:6px;font-size:10px;padding:6px 9px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);margin-bottom:4px;}
.file-item-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.file-item-size{color:var(--muted);white-space:nowrap;font-size:9px;flex-shrink:0;}
.file-item-dl{color:var(--accent);text-decoration:none;font-size:9px;white-space:nowrap;flex-shrink:0;padding:2px 6px;border-radius:4px;border:1px solid var(--blue-border);background:var(--blue-bg);}
.file-item-dl:hover{opacity:.8;}
.file-item-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:12px;padding:0 2px;flex-shrink:0;transition:color .1s;line-height:1;}
.file-item-del:hover{color:var(--red);}
.files-empty{font-size:10px;color:var(--muted);font-style:italic;padding:2px 0;}
.upload-status{font-size:10px;color:var(--accent);font-style:italic;min-height:14px;}

/* VOZ AI */
.mic-trigger-btn{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border:1px solid var(--border);border-radius:20px;background:var(--surface2);font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);cursor:pointer;text-transform:uppercase;letter-spacing:.07em;transition:all .18s;margin-left:auto;}
.mic-trigger-btn:hover{border-color:var(--accent);color:var(--accent);}
.mic-trigger-btn svg{width:12px;height:12px;}
.mic-trigger-btn.recording{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,.07);animation:micPulse 1.2s ease-in-out infinite;}
.voz-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:700;align-items:flex-end;justify-content:center;}
.voz-modal-overlay.open{display:flex;animation:fadeIn .2s ease;}
.voz-modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:560px;box-shadow:0 -8px 40px rgba(0,0,0,.2);overflow:hidden;animation:slideUp .25s ease;}
.voz-modal-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.voz-modal-header h3{font-family:'Manrope',sans-serif;font-weight:700;font-size:13px;flex:1;}
.voz-modal-close{background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;padding:0 4px;line-height:1;transition:color .15s;}
.voz-modal-close:hover{color:var(--text);}
.voz-modal-body{padding:20px;}
.voz-mic-wrap{text-align:center;margin-bottom:18px;}
.voz-mic-btn{width:64px;height:64px;border-radius:50%;border:none;background:var(--surface2);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;position:relative;transition:all .2s;outline:none;}
.voz-mic-btn svg{width:26px;height:26px;color:var(--muted);transition:color .2s;position:relative;z-index:1;}
.voz-mic-btn:hover svg{color:var(--text);}
.voz-mic-btn.recording{background:rgba(239,68,68,.1);}
.voz-mic-btn.recording svg{color:#ef4444;}
.voz-mic-btn.recording::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:2px solid #ef4444;animation:ripple 1.2s ease-out infinite;opacity:.6;}
.voz-status{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:10px;}
.voz-status.rec{color:#ef4444;}
.voz-waves{display:flex;align-items:center;justify-content:center;gap:3px;height:24px;margin:8px 0;}
.voz-wave{width:3px;background:var(--accent);border-radius:2px;height:3px;opacity:.3;}
.voz-modal-overlay.recording .voz-wave{opacity:1;}
.voz-modal-overlay.recording .voz-wave:nth-child(1){animation:vWave 1s ease-in-out infinite 0s;}
.voz-modal-overlay.recording .voz-wave:nth-child(2){animation:vWave 1s ease-in-out infinite .1s;}
.voz-modal-overlay.recording .voz-wave:nth-child(3){animation:vWave 1s ease-in-out infinite .2s;}
.voz-modal-overlay.recording .voz-wave:nth-child(4){animation:vWave 1s ease-in-out infinite .05s;}
.voz-modal-overlay.recording .voz-wave:nth-child(5){animation:vWave 1s ease-in-out infinite .15s;}
.voz-modal-overlay.recording .voz-wave:nth-child(6){animation:vWave 1s ease-in-out infinite .08s;}
.voz-modal-overlay.recording .voz-wave:nth-child(7){animation:vWave 1s ease-in-out infinite .18s;}
.voz-transcript{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12px;line-height:1.6;min-height:40px;margin-bottom:14px;display:none;color:var(--text);}
.voz-transcript.visible{display:block;}
.voz-transcript-interim{color:var(--muted);font-style:italic;}
.voz-fields{display:none;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.voz-fields.visible{display:grid;}
.voz-field{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;}
.voz-field.full{grid-column:1/-1;}
.voz-field-key{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:3px;}
.voz-field-val{font-size:11px;color:var(--text);}
.voz-field-val.empty{color:var(--muted);font-style:italic;}
.voz-actions{display:flex;gap:8px;}
.voz-btn{flex:1;padding:9px 12px;border:none;border-radius:9px;font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;}
.voz-btn:hover{opacity:.82;}
.voz-btn:disabled{opacity:.35;cursor:not-allowed;}
.voz-btn-confirm{background:var(--text);color:#fff;}
.voz-btn-retry,.voz-btn-cancel{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.voz-loading{text-align:center;padding:14px 0;display:none;}
.voz-loading.visible{display:block;}
.voz-dots{display:inline-flex;gap:4px;}
.voz-dots span{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:vDot 1.2s ease-in-out infinite;}
.voz-dots span:nth-child(2){animation-delay:.2s;}
.voz-dots span:nth-child(3){animation-delay:.4s;}
@keyframes micPulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 0 4px rgba(239,68,68,.15)}}
@keyframes ripple{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.6);opacity:0}}
@keyframes vWave{0%,100%{height:3px}50%{height:18px}}
@keyframes vDot{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>
<body>

<div class="page">
  <div class="header-row">
    <div class="header-top">
      <h1>Gestão de Tarefas</h1>
      <span id="syncStatus"></span>
    </div>
    <p class="subtitle" id="pageSubtitle">A carregar…</p>
  </div>

  <div class="stats-gestor-row" id="statsBar">
    <div style="font-size:11px;color:var(--muted);">A carregar…</div>
  </div>

  <!-- FORM -->
  <div class="novo-pedido-panel">
    <div class="panel-title">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><path d="M8 5v3.5l2 1.5"/></svg>
      Nova Tarefa
      <button class="mic-trigger-btn" onclick="vozAbrir('tarefa')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="5" y="1" width="6" height="9" rx="3"/><path d="M2 8c0 3.3 2.7 6 6 6s6-2.7 6-6"/><path d="M8 14v2"/></svg>
        Voz
      </button>
    </div>
    <div class="form-grid">

      <!-- utilizador logado (readonly) -->
      <div>
        <label class="field-label">Criado por</label>
        <div class="user-info-row">
          <span class="user-info-name" id="userName">A carregar…</span>
        </div>
      </div>

      <!-- escritório destino editável -->
      <div>
        <label class="field-label">Escritório destino</label>
        <select class="form-select" id="fEscritorio">
          <option value="">A carregar…</option>
        </select>
      </div>

      <div class="full">
        <label class="field-label">Título da tarefa *</label>
        <input type="text" class="form-input" id="fTitulo" placeholder="ex: Relatório mensal — Cliente X" maxlength="100" autocomplete="off">
      </div>
      <div class="full">
        <label class="field-label">Descrição / detalhe</label>
        <input type="text" class="form-input" id="fDescricao" placeholder="ex: Enviar até sexta com anexo PDF" maxlength="300" autocomplete="off">
      </div>
      <div class="full">
        <label class="field-label">Prioridade</label>
        <div class="prio-row">
          <button class="prio-pill" data-p="urgente" onclick="selPrio('urgente')">🔴 Urgente</button>
          <button class="prio-pill sel" data-p="normal" onclick="selPrio('normal')">🟡 Normal</button>
          <button class="prio-pill" data-p="baixa" onclick="selPrio('baixa')">🟢 Baixa</button>
        </div>
      </div>
    </div>
    <div class="form-grid" style="margin-top:10px;">
      <div class="full">
        <label class="field-label">Anexos (opcional)</label>
        <label class="btn-attach" onclick="void(0)">
          📎 Adicionar ficheiros
          <input type="file" id="fFicheiros" multiple onchange="onPendingFilesChange(this)">
        </label>
        <div id="pendingFilesList" style="margin-top:6px;"></div>
        <div class="upload-status" id="formUploadStatus"></div>
      </div>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:14px;">
      <button class="btn btn-primary" onclick="submitTarefa()">+ Nova Tarefa</button>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls-wrap">
    <div class="controls-row">
      <span class="label">Ordenar:</span>
      <button class="sort-btn active" data-sort="prio" onclick="setSort('prio')">Prioridade</button>
      <button class="sort-btn" data-sort="fifo" onclick="setSort('fifo')">Chegada</button>
      <button class="sort-btn" data-sort="estado" onclick="setSort('estado')">Estado</button>
      <span class="count-badge" id="countBadge"></span>
    </div>
    <div class="controls-row">
      <span class="label">Filtrar:</span>
      <button class="filter-btn" data-f="todos" onclick="setFilter('todos')">Todos</button>
      <button class="filter-btn active" data-f="activos" onclick="setFilter('activos')">Activos</button>
      <button class="filter-btn" data-f="concluido" onclick="setFilter('concluido')">Concluídos</button>
      <select class="filter-select" id="filterEscritorio" onchange="setFilterEscritorio(this.value)">
        <option value="">Todos os escritórios</option>
      </select>
      <select class="filter-select" id="filterPessoa" onchange="setFilterPessoa(this.value)">
        <option value="">Todos os criadores</option>
      </select>
    </div>
  </div>

  <div class="tasks-list" id="tasksList"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="firebase-init.js"></script>
<script src="utils.js"></script>
<script src="auth.js"></script>
<script src="config-escritorios.js"></script>
<script src="auditoria.js"></script>
<script>
const db = firebase.firestore();
const storage = firebase.storage();
let col;
let tasks = [], selPrioVal = 'normal', sortMode = 'prio', filterMode = 'activos', filterPessoa = '';
let pendingFiles = [];
window._files = {};
const expandedIds = new Set();
const PRIO_ORDER = { urgente:0, normal:1, baixa:2 };
const ESTADO_ORDER = { progresso:0, aguardar:1, pendente:2, cancelado:3, concluido:4 };
const ESTADO_LABEL = { aguardar:'A aguardar', progresso:'Em progresso', concluido:'Concluído', cancelado:'Cancelado', pendente:'Pendente' };
const PRIO_LABEL = { urgente:'Urgente', normal:'Normal', baixa:'Baixa' };

let filterEscritorio = '';

document.addEventListener('authReady', ({ detail }) => {
  window.renderNavbar('tarefas');

  const profile    = detail.profile;
  const isAdmin    = window.isAdmin();
  const escritorio = window.escritorioAtivo();

  // mostrar/esconder form de criar tarefa
  const canCreate = window.temPermissao('criarTarefas');
  const formPanel = document.querySelector('.novo-pedido-panel');
  if (formPanel) formPanel.style.display = canCreate ? '' : 'none';

  // preencher info do utilizador no form
  if (profile) {
    const nome = profile.nomeCompleto || profile.nome || profile.email || '?';
    const userNameEl   = document.getElementById('userName');
    const userAvatarEl = document.getElementById('userAvatar');
    if (userNameEl)   userNameEl.textContent   = nome;
    if (userAvatarEl) userAvatarEl.textContent = nome.charAt(0).toUpperCase();
  }

  // carregar escritórios dinamicamente (do Firestore via config-escritorios.js)
  window.loadEscritorios().then(lista => {
    const selEsc = document.getElementById('fEscritorio');
    const selFil = document.getElementById('filterEscritorio');

    // popular select do formulário
    if (selEsc) {
      selEsc.innerHTML = lista.map(e => `<option value="${e.id}">${e.nome}</option>`).join('');
      if (profile && profile.escritorio && lista.find(e => e.id === profile.escritorio)) {
        selEsc.value = profile.escritorio;
      }
    }

    // popular select do filtro (mantém a opção "Todos os escritórios")
    if (selFil) {
      selFil.innerHTML = '<option value="">Todos os escritórios</option>' +
        lista.map(e => `<option value="${e.id}">${e.nome}</option>`).join('');
      if (filterEscritorio) selFil.value = filterEscritorio;
    }
  });

  // subtitle
  const nomeAtivo = filterEscritorio
    ? (window.nomeEscritorio ? window.nomeEscritorio(filterEscritorio) : filterEscritorio)
    : 'Todos os escritórios';
  document.getElementById('pageSubtitle').textContent = nomeAtivo;

  // filtro escritório: por defeito = escritório do utilizador (para todos)
  // admin vê "todos" por defeito, colaborador vê o seu escritório
  const fe = document.getElementById('filterEscritorio');
  if (isAdmin) {
    filterEscritorio = (escritorio && escritorio !== 'todos') ? escritorio : '';
  } else {
    filterEscritorio = profile ? (profile.escritorio || '') : '';
  }
  if (filterEscritorio && fe) fe.value = filterEscritorio;

  // carregar tudo (filtro é feito no cliente para permitir ver outros escritórios)
  col = db.collection('tarefas_todo');

  setStatus('A ligar…', '#f59e0b');
  const unsubTarefas = col.orderBy('ordemChegada', 'asc').limit(200).onSnapshot(snap => {
    tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
    setStatus('✓ Sincronizado', '#16a34a');
    setTimeout(() => setStatus(''), 3000);
  }, err => {
    console.error('tarefas (orderBy):', err);
    // Fallback sem orderBy — evita página em branco se o índice falhar
    const unsubFallback = col.limit(200).onSnapshot(snap => {
      tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      render();
      setStatus('✓ Sincronizado', '#16a34a');
      setTimeout(() => setStatus(''), 3000);
    }, err2 => { console.error('tarefas fallback:', err2); setStatus('Erro de ligação', '#dc2626'); });
    window._tarefasUnsub = unsubFallback;
  });
  window._tarefasUnsub = unsubTarefas;
  window.addEventListener('beforeunload', () => { if (window._tarefasUnsub) window._tarefasUnsub(); });
});


async function submitTarefa() {
  const titulo    = document.getElementById('fTitulo').value.trim();
  const descricao = document.getElementById('fDescricao').value.trim();
  const destino   = document.getElementById('fEscritorio').value;
  if (!titulo) { toast('Introduz o título da tarefa!'); return; }

  const profile     = window.userProfile;
  const solicitante = profile ? (profile.nomeCompleto || profile.nome || profile.email) : '—';
  const escritorioOrigem = profile && profile.escritorio ? profile.escritorio : '';

  const maxOrdem = tasks.length ? Math.max(...tasks.map(t => t.ordemChegada || 0)) : 0;
  try {
    const dadosTarefa = {
      titulo, descricao, solicitante,
      prioridade: selPrioVal, estado: 'aguardar', notas: '',
      criadaEm: Date.now(), ordemChegada: maxOrdem + 1,
      escritorio: destino,
      escritorioOrigem,
      criadoPor: window.currentUser ? window.currentUser.uid : ''
    };
    const docRef = await col.add(dadosTarefa);
    await registarAuditoria({
      modulo: 'tarefas', acao: 'criado',
      docId: docRef.id, titulo,
      depois: dadosTarefa,
    });

    // Upload pending files
    if (pendingFiles.length) {
      const statusEl = document.getElementById('formUploadStatus');
      if (statusEl) statusEl.textContent = 'A carregar anexos…';
      const ficheiros = [];
      for (const file of pendingFiles) {
        const path = `tarefas/${docRef.id}/${Date.now()}_${file.name}`;
        try {
          const ref  = storage.ref(path);
          const snap = await ref.put(file);
          const url  = await snap.ref.getDownloadURL();
          ficheiros.push({ nome: file.name, url, tamanho: file.size, criadoEm: Date.now(), path });
        } catch(e) { console.error(e); toast('Erro ao carregar: ' + file.name); }
      }
      if (ficheiros.length) await docRef.update({ ficheiros });
      if (statusEl) statusEl.textContent = '';
    }

    pendingFiles = [];
    renderPendingFilesList();
    document.getElementById('fTitulo').value    = '';
    document.getElementById('fDescricao').value = '';
    selPrio('normal');
    toast('✓ Tarefa adicionada em ' + destino.charAt(0).toUpperCase() + destino.slice(1) + '!');
  } catch(e) { console.error(e); toast('Erro ao adicionar.'); }
}

async function updateEstado(id, val) {
  try {
    const snap = await col.doc(id).get();
    const antes = snap.data();
    await col.doc(id).update({ estado: val });
    await registarAuditoria({
      modulo: 'tarefas', acao: 'estado',
      docId: id, titulo: antes.titulo,
      antes: { estado: antes.estado },
      depois: { estado: val },
    });
  } catch(e) { toast('Erro.'); }
}
async function updateNotas(id, val) {
  try {
    const snap = await col.doc(id).get();
    const antes = snap.data();
    await col.doc(id).update({ notas: val });
    await registarAuditoria({
      modulo: 'tarefas', acao: 'atualizado',
      docId: id, titulo: antes.titulo,
      antes: { notas: antes.notas },

async function deleteTask(id) {
  if (!await confirmar({ titulo: 'Eliminar esta tarefa?', btnOk: 'Confirmar', perigo: true })) return;
  expandedIds.delete(id);
  try {
    const snap = await col.doc(id).get();
    const antes = snap.data();
    await col.doc(id).delete();
    await registarAuditoria({
      modulo: 'tarefas', acao: 'eliminado',
      docId: id, titulo: antes.titulo,
      antes,
    });
    toast('Eliminada.');
  } catch(e) { toast('Erro.'); }
}

function getSorted(list) {
  const copy = [...list];
  if (sortMode === 'fifo') return copy.sort((a,b) => (a.ordemChegada||0)-(b.ordemChegada||0));
  if (sortMode === 'prio') return copy.sort((a,b) => {
    const aDone = (a.estado==='concluido'||a.estado==='cancelado')?1:0;
    const bDone = (b.estado==='concluido'||b.estado==='cancelado')?1:0;
    if (aDone!==bDone) return aDone-bDone;
    const pd = (PRIO_ORDER[a.prioridade]??1)-(PRIO_ORDER[b.prioridade]??1);
    return pd!==0?pd:(a.ordemChegada||0)-(b.ordemChegada||0);
  });
  return copy.sort((a,b) => {
    const ed=(ESTADO_ORDER[a.estado]??1)-(ESTADO_ORDER[b.estado]??1);
    return ed!==0?ed:(PRIO_ORDER[a.prioridade]??1)-(PRIO_ORDER[b.prioridade]??1);
  });
}

function getFiltered(list) {
  let out = list;
  if (filterMode==='activos')   out=out.filter(t=>t.estado!=='concluido'&&t.estado!=='cancelado');
  if (filterMode==='concluido') out=out.filter(t=>t.estado==='concluido'||t.estado==='cancelado');
  if (filterPessoa)             out=out.filter(t=>t.solicitante===filterPessoa);
  if (filterEscritorio)         out=out.filter(t=>t.escritorio===filterEscritorio);
  return out;
}

function setSort(mode) { sortMode=mode; document.querySelectorAll('.sort-btn').forEach(b=>b.classList.toggle('active',b.dataset.sort===mode)); renderList(); }
function setFilter(mode) { filterMode=mode; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.f===mode)); renderList(); }

    <div class="stat-chip s-ok"><span class="stat-val">${conc}</span><span class="stat-lbl">Concluídas</span></div>`;
}

  const sel=document.getElementById('filterPessoa'), cur=filterPessoa;

function toggleCard(id) { if(expandedIds.has(id)) expandedIds.delete(id); else expandedIds.add(id); renderList(); }
function selPrio(p) { selPrioVal=p; document.querySelectorAll('.prio-pill').forEach(b=>b.classList.toggle('sel',b.dataset.p===p)); }

// ── PENDING FILES (form) ──
function onPendingFilesChange(input) {
  Array.from(input.files).forEach(f => {
    if (f.size > 15 * 1024 * 1024) { toast('Ficheiro demasiado grande (máx 15 MB): ' + f.name); return; }
    pendingFiles.push(f);
  });
  input.value = '';
  renderPendingFilesList();
}

function renderPendingFilesList() {
  const container = document.getElementById('pendingFilesList');
  if (!container) return;
  if (!pendingFiles.length) { container.innerHTML = ''; return; }
  container.innerHTML = pendingFiles.map((f, i) => `
    <div class="file-item">
      <span>📄</span>
      <span class="file-item-name" title="${escHtml(f.name)}">${escHtml(f.name)}</span>
      <span class="file-item-size">${fmtBytes(f.size)}</span>
      <button class="file-item-del" onclick="removePendingFile(${i})" title="Remover">✕</button>
    </div>`).join('');
}

function removePendingFile(i) {
  pendingFiles.splice(i, 1);
  renderPendingFilesList();
}

// ── FILE UPLOADS ──
function renderFicheiros(docId, ficheiros, canDel) {
  window._files[docId] = ficheiros;
  if (!ficheiros.length) return '<div class="files-empty">Sem anexos</div>';
  return ficheiros.map((f, i) => `
    <div class="file-item">
      <span>📄</span>
      <span class="file-item-name" title="${escHtml(f.nome)}">${escHtml(f.nome)}</span>
      <span class="file-item-size">${fmtBytes(f.tamanho)}</span>
      <a class="file-item-dl" href="${escHtml(f.url)}" target="_blank" rel="noopener">⬇ Download</a>
      ${canDel ? `<button class="file-item-del" onclick="event.stopPropagation();deleteFicheiro('${escHtml(docId)}',${i})" title="Remover">✕</button>` : ''}
    </div>`).join('');
}


async function deleteFicheiro(docId, index) {
  const f = (window._files[docId] || [])[index];
  if (!f || !await confirmar({ titulo: 'Remover este anexo?', btnOk: 'Remover', perigo: true })) return;
  try {
    if (f.path) await storage.ref(f.path).delete().catch(()=>{});
    await col.doc(docId).update({ ficheiros: firebase.firestore.FieldValue.arrayRemove(f) });
    toast('Ficheiro removido.');
  } catch(e) { toast('Erro ao remover.'); }
}

function fmtBytes(b) {
  if (!b) return '';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return Math.round(b / 1024) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}

<script>

const VOZ_CLAUDE_API_KEY = ''; // coloca a tua API key aqui

// ── Helper: normalizar escritório (ignora maiúsculas, acentos, palavras extra)
function _vozNormalizarEsc(valor) {
  if (!valor) return '';
  const lista = window.getEscritoriosSync ? window.getEscritoriosSync() : [];
  const limpar = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,' ').trim();
  const v = limpar(valor);
  return (lista.find(e => v.includes(limpar(e.id)) || limpar(e.id).includes(v) || v.includes(limpar(e.nome)) || limpar(e.nome).includes(v)) || {}).id || '';
}

const VOZ_PROMPTS = {
  tarefa: `Analisa este texto em português e extrai os dados para uma tarefa interna.
Responde APENAS com um objecto JSON válido, sem texto adicional, sem marcadores de código.
Usa exactamente estas chaves (deixa em branco "" se não mencionado):
{"titulo":"título curto da tarefa (máx 80 chars)","descricao":"descrição detalhada ou vazio","prioridade":"urgente ou normal ou baixa","escritorio":"quarteira ou albufeira ou lisboa ou porto","departamento":"nome do departamento ou vazio"}`,

};

const VOZ_LABELS = {
  tarefa:   {titulo:'Título',descricao:'Descrição',prioridade:'Prioridade',escritorio:'Escritório',departamento:'Departamento'},

let _vozTipo = 'tarefa';
let _vozRec = null;

function vozFechar() {

function vozIniciar() {

    _vozGravando = true;
    document.getElementById('vozMicBtn').classList.add('recording');
    document.getElementById('vozModal').classList.add('recording');
    document.getElementById('vozStatus').textContent = 'A ouvir… (clica para parar)';
    document.getElementById('vozStatus').className = 'voz-status rec';
    document.getElementById('vozMicIcon').innerHTML = '<rect x="4" y="4" width="8" height="8" rx="1" fill="currentColor" stroke="none"/>';
  };
  _vozRec.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) _vozTranscricao += t + ' ';
      else interim = t;
    }
    document.getElementById('vozTranscriptFinal').textContent = _vozTranscricao;
    document.getElementById('vozTranscriptInterim').textContent = interim;
  };
  _vozRec.onerror = () => vozParar();
  _vozRec.onend = () => { if (_vozGravando) _vozRec.start(); };
  _vozRec.start();
}

function vozParar() {
  _vozGravando = false;
  if (_vozRec) { _vozRec.onend = null; _vozRec.stop(); }
  document.getElementById('vozMicBtn').classList.remove('recording');
  document.getElementById('vozModal').classList.remove('recording');
  document.getElementById('vozStatus').textContent = 'Clica para falar';
  document.getElementById('vozStatus').className = 'voz-status';
  document.getElementById('vozMicIcon').innerHTML = '<rect x="5" y="1" width="6" height="9" rx="3"/><path d="M2 8c0 3.3 2.7 6 6 6s6-2.7 6-6"/><path d="M8 14v2"/>';
  const texto = _vozTranscricao.trim();
  if (texto) vozProcessar(texto);
}

async function vozProcessar(texto) {
  document.getElementById('vozLoading').classList.add('visible');
  document.getElementById('vozFields').classList.remove('visible');
  document.getElementById('vozActions').innerHTML = '';

  try {
    let dados;
    if (!VOZ_CLAUDE_API_KEY) {
      await new Promise(r => setTimeout(r, 1400));
      dados = vozSimular(texto, _vozTipo);
    } else {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': VOZ_CLAUDE_API_KEY,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 800,
          messages: [{ role: 'user', content: VOZ_PROMPTS[_vozTipo] + '\n\nTexto: "' + texto + '"' }]
        })
      });
      const data = await resp.json();
      const raw = data.content?.[0]?.text || '{}';
      dados = JSON.parse(raw.replace(/```json|```/g,'').trim());
    }
    _vozDados = dados;
    vozMostrarCampos(dados);
  } catch(e) {
    document.getElementById('vozLoading').classList.remove('visible');
    document.getElementById('vozStatus').textContent = 'Erro: ' + e.message;
    document.getElementById('vozActions').innerHTML = '<button class="voz-btn voz-btn-retry" onclick="vozProcessar(_vozTranscricao.trim())">Tentar novamente</button><button class="voz-btn voz-btn-cancel" onclick="vozFechar()">Cancelar</button>';
  }
}

function vozMostrarCampos(dados) {
  document.getElementById('vozLoading').classList.remove('visible');
  const labels = VOZ_LABELS[_vozTipo];
  const fields = document.getElementById('vozFields');
  const fullFields = _vozTipo === 'tarefa' ? ['descricao'] : ['empresa'];
  fields.innerHTML = Object.entries(dados).map(([k,v]) => {
    if (!(k in labels)) return '';
    const empty = !v || v === '' || v === 'vazio';
    const full = fullFields.includes(k);
    return '<div class="voz-field' + (full?' full':'') + '"><div class="voz-field-key">' + labels[k] + '</div><div class="voz-field-val' + (empty?' empty':'') + '">' + (empty ? '—' : String(v)) + '</div></div>';
  }).join('');
  fields.classList.add('visible');
  document.getElementById('vozActions').innerHTML = `
    <button class="voz-btn voz-btn-confirm" onclick="vozConfirmar()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8l3.5 3.5L13 4"/></svg>
      Preencher formulário
    </button>
    <button class="voz-btn voz-btn-retry" onclick="vozToggle()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 8A6 6 0 1114 8"/><path d="M2 8V4H6"/></svg>
      Regravar
    </button>`;
}

function vozConfirmar() {
  if (!_vozDados) return;
  if (_vozTipo === 'tarefa') vozPreencherTarefa(_vozDados);
  else vozPreencherAdmissao(_vozDados);
  vozFechar();
  document.querySelector('.novo-pedido-panel, .form-panel')?.scrollIntoView({behavior:'smooth', block:'start'});
}

function vozPreencherTarefa(d) {
  if (d.titulo)    document.getElementById('fTitulo').value    = d.titulo.trim();
  if (d.descricao) document.getElementById('fDescricao').value = d.descricao.trim();
  // Escritório — normalização robusta
  const escId = _vozNormalizarEsc(d.escritorio);
  if (escId) {
    const sel = document.getElementById('fEscritorio');
    if (sel) [...sel.options].forEach(o => { if (o.value === escId) sel.value = o.value; });
  }
  // Prioridade — chama selPrio() para actualizar variável E pills
  if (d.prioridade && typeof selPrio === 'function') {
    const p = String(d.prioridade).toLowerCase().trim();
    selPrio(['urgente','normal','baixa'].includes(p) ? p : 'normal');
  }
  toast('Formulário preenchido por voz ✓');
}

function vozPreencherAdmissao(d) {
  // Tipo — chama selTipo() para actualizar cards e variável interna
  if (d.tipo && typeof selTipo === 'function') selTipo(d.tipo === 'cessacao' ? 'cessacao' : 'admissao');
  if (d.nome)     document.getElementById('fNome').value    = d.nome.trim();
  if (d.numero)   document.getElementById('fNumero').value  = String(d.numero).trim();
  if (d.nif)      document.getElementById('fNif').value     = String(d.nif).trim();
  if (d.empresa)  { const el = document.getElementById('fEmpresa');   if (el) el.value = d.empresa.trim(); }
  if (d.categoria){ const el = document.getElementById('fCategoria'); if (el) el.value = d.categoria.trim(); }
  if (d.valorBase){ const el = document.getElementById('fValorBase'); if (el) el.value = String(d.valorBase).replace(/[^0-9.]/g,''); }
  if (d.dataEntrada) {
    const el = document.getElementById('fDataEntrada');
    if (el) { el.value = d.dataEntrada; if (typeof updatePrioPreview === 'function') updatePrioPreview(); }
  }
  // Escritório — normalização robusta
  const escId = _vozNormalizarEsc(d.escritorio);
  if (escId) {
    const sel = document.getElementById('fEscritorioAdm');
    if (sel) [...sel.options].forEach(o => { if (o.value === escId) sel.value = o.value; });
  }
  // Tipo de pagamento — chama selPagamento()
  if (d.tipoPagamento && typeof selPagamento === 'function') {
    selPagamento(String(d.tipoPagamento).toLowerCase() === 'hora' ? 'hora' : 'mes');
  }
  toast('Formulário preenchido por voz ✓');
}

// Simulação offline
function vozSimular(texto, tipo) {
  const t = texto.toLowerCase();
  const nome = (texto.match(/\b([A-ZÁÉÍÓÚÀÂÊÔÃÕÇ][a-záéíóúàâêôãõç]+(?:\s+[A-ZÁÉÍÓÚÀÂÊÔÃÕÇ][a-záéíóúàâêôãõç]+)+)\b/) || [])[1] || '';
  const esc  = _vozNormalizarEsc((window.getEscritoriosSync ? window.getEscritoriosSync() : []).map(e => e.id).find(e => t.includes(e)) || '');
  const data = (texto.match(/\b(\d{4}-\d{2}-\d{2}|\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4})\b/) || [])[1] || '';
  const numero = (texto.match(/(?:n[uúº°]mero|n[oº]\.?)\s*(\d+)/i) || [])[1] || '';
  const empM = texto.match(/(?:empresa|para\s+(?:a\s+)?empresa)\s+([A-Za-zÀ-ÿ0-9 &,\.]+?)(?:\s+(?:base|categoria|nif|n[uú]mero|escritório|€|\d))/i);
  const catM = texto.match(/categoria\s+([A-Za-zÀ-ÿ ]+?)(?:\s+(?:base|empresa|nif|escritório|€|\d|$))/i);
  const valM = texto.match(/(?:base\s+|salário\s+)?(\d[\d\s]*(?:[.,]\d{1,2})?)\s*€/i) || texto.match(/base\s+(\d[\d\s]*(?:[.,]\d{1,2})?)/i);
  const nif  = (texto.match(/\b(\d{9})\b/) || [])[1] || '';
  if (tipo === 'tarefa') {
    return {
      titulo: texto.split(' ').slice(0,7).join(' ').replace(/^\w/, c => c.toUpperCase()),
      descricao: texto.length > 50 ? texto : '',
      prioridade: t.includes('urgente') ? 'urgente' : t.includes('baixa') ? 'baixa' : 'normal',
      escritorio: esc,
      departamento: t.includes('contabil') ? 'Contabilidade' : t.includes('payroll')||t.includes('rh') ? 'Payroll' : '',
    };
  }
  return {
    tipo:          t.includes('cessa') || t.includes('saída') || t.includes('saida') ? 'cessacao' : 'admissao',
    nome,
    numero,
    nif,
    empresa:       empM ? empM[1].trim() : '',
    categoria:     catM ? catM[1].trim() : '',
    escritorio:    esc,
    dataEntrada:   data,
    valorBase:     valM ? valM[1].replace(/\s/g,'').replace(',','.') : '',
    tipoPagamento: t.includes(' hora') || t.includes('horário') ? 'hora' : 'mes',
  };
}

// Fechar ao clicar fora
document.getElementById('vozModal').addEventListener('click', function(e) {
  if (e.target === this) vozFechar();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') vozFechar(); });
</script>
