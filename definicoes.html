<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Definições</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Manrope:wght@600;700;800&display=swap');
:root{--bg:#f4f4f6;--surface:#fff;--surface2:#f7f7f9;--border:#e2e2e8;--text:#1a1a22;--muted:#8888a0;--accent:#2563eb;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;}
.page{max-width:860px;margin:0 auto;padding:32px 20px;}
h1{font-family:'Manrope',sans-serif;font-weight:800;font-size:clamp(20px,2.5vw,26px);letter-spacing:-.03em;margin-bottom:4px;}
.subtitle{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:32px;}
.def-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:40px;}
@media(max-width:580px){.def-grid{grid-template-columns:1fr;}}
.def-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 26px;box-shadow:0 1px 6px rgba(0,0,0,.06);text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:14px;transition:all .18s;}
.def-card:hover{border-color:var(--accent);box-shadow:0 6px 20px rgba(37,99,235,.12);transform:translateY(-2px);}
.def-card-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;}
.def-card-icon svg{width:22px;height:22px;}
.blue{background:#eff6ff;color:#2563eb;}
.purple{background:#f5f3ff;color:#7c3aed;}
.def-card-title{font-family:'Manrope',sans-serif;font-weight:800;font-size:15px;letter-spacing:-.02em;}
.def-card-desc{font-size:11px;color:var(--muted);line-height:1.75;}
.def-card-link{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:.07em;margin-top:4px;}
.def-card-link svg{width:11px;height:11px;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.06);margin-bottom:20px;display:none;}
.panel-header{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.panel-header h2{font-family:'Manrope',sans-serif;font-weight:700;font-size:13px;flex:1;}
.panel-body{padding:20px 22px;}
.btn{padding:7px 14px;border:none;border-radius:8px;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;text-transform:uppercase;letter-spacing:.08em;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
.btn-primary{background:var(--text);color:#fff;}
.btn-primary:hover{opacity:.82;}
table{width:100%;border-collapse:collapse;font-size:11px;}
th{text-align:left;padding:6px 10px;font-size:10px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);}
td{padding:9px 10px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
.badge{font-size:9px;padding:2px 8px;border-radius:10px;display:inline-block;}
.badge-admin{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe;}
.badge-colab{background:#f4f4f6;color:#8888a0;border:1px solid #e2e2e8;}
.badge-ativo{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;}
.badge-inativo{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;}
</style>
</head>
<body>
<div class="page">
  <h1>Definições</h1>
  <p class="subtitle">Administração do sistema</p>

  <div class="def-grid">
    <a class="def-card" href="#" onclick="toggleUtilizadores(event)">
      <div class="def-card-icon blue">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
          <circle cx="5.5" cy="5" r="2.5"/>
          <path d="M1 13c0-2.5 1.8-4 4.5-4s4.5 1.5 4.5 4"/>
          <circle cx="12" cy="4.5" r="1.8"/>
          <path d="M10.5 8c1.5.3 3 1.3 3 3.5"/>
        </svg>
      </div>
      <div>
        <div class="def-card-title">Utilizadores</div>
        <div class="def-card-desc">Gerir contas, roles e permissões de todos os colaboradores.</div>
      </div>
      <span class="def-card-link">
        Ver utilizadores
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4l4 4-4 4"/></svg>
      </span>
    </a>

    <a class="def-card" href="gerir-calendarios.html">
      <div class="def-card-icon purple">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
          <rect x="2" y="3" width="12" height="11" rx="1.5"/>
          <path d="M5 1v3M11 1v3M2 7h12"/>
          <path d="M5 10h2M9 10h2M5 13h2"/>
        </svg>
      </div>
      <div>
        <div class="def-card-title">Calendário</div>
        <div class="def-card-desc">Publicar feriados e eventos, apagar erros, consultar calendários de todos os escritórios.</div>
      </div>
      <span class="def-card-link">
        Gerir calendários
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4l4 4-4 4"/></svg>
      </span>
    </a>
  </div>

  <div class="panel" id="panelUtilizadores">
    <div class="panel-header">
      <div class="def-card-icon blue" style="width:30px;height:30px;">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" style="width:15px;height:15px;">
          <circle cx="5.5" cy="5" r="2.5"/><path d="M1 13c0-2.5 1.8-4 4.5-4s4.5 1.5 4.5 4"/>
          <circle cx="12" cy="4.5" r="1.8"/><path d="M10.5 8c1.5.3 3 1.3 3 3.5"/>
        </svg>
      </div>
      <h2>Utilizadores</h2>
      <a href="utilizadores.html" class="btn btn-primary">Gerir completo →</a>
    </div>
    <div class="panel-body" id="utilizadoresBody">
      <p style="font-size:11px;color:var(--muted);text-align:center;padding:16px 0;">A carregar…</p>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-init.js"></script>
<script src="auth.js"></script>
<script>
document.addEventListener('authReady', () => {
  window.renderNavbar('definicoes');
  if (!window.isAdmin()) {
    document.querySelector('.page').innerHTML =
      '<div style="text-align:center;padding:80px 20px;font-size:13px;color:var(--muted);">Acesso restrito a administradores.</div>';
  }
});

let utilizadoresCarregados = false;
let painelAberto = false;

function toggleUtilizadores(e) {
  e.preventDefault();
  const painel = document.getElementById('panelUtilizadores');
  painelAberto = !painelAberto;
  painel.style.display = painelAberto ? 'block' : 'none';
  if (painelAberto && !utilizadoresCarregados) carregarUtilizadores();
  if (painelAberto) setTimeout(() => painel.scrollIntoView({ behavior:'smooth', block:'start' }), 50);
}

async function carregarUtilizadores() {
  const body = document.getElementById('utilizadoresBody');
  try {
    const snap = await firebase.firestore().collection('utilizadores').get();
    const users = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a,b) => (a.nomeCompleto||'').localeCompare(b.nomeCompleto||''));

    if (!users.length) {
      body.innerHTML = '<p style="font-size:11px;color:var(--muted);text-align:center;padding:16px 0;">Sem utilizadores.</p>';
      return;
    }

    body.innerHTML = `
      <div style="overflow-x:auto;">
        <table>
          <thead><tr><th>Nome</th><th>Email</th><th>Escritório</th><th>Role</th><th>Estado</th></tr></thead>
          <tbody>
            ${users.map(u => `<tr>
              <td>${u.nomeCompleto || u.nome || '—'}</td>
              <td style="color:var(--muted);">${u.email || '—'}</td>
              <td style="text-transform:capitalize;">${u.escritorio || '—'}</td>
              <td><span class="badge ${u.role==='admin'?'badge-admin':'badge-colab'}">${u.role==='admin'?'Admin':'Colaborador'}</span></td>
              <td><span class="badge ${u.ativo!==false?'badge-ativo':'badge-inativo'}">${u.ativo!==false?'Ativo':'Inativo'}</span></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div style="margin-top:14px;text-align:right;">
        <a href="utilizadores.html" class="btn btn-primary">Gerir utilizadores →</a>
      </div>`;
    utilizadoresCarregados = true;
  } catch(e) {
    body.innerHTML = `<p style="font-size:11px;color:#dc2626;text-align:center;padding:16px 0;">Erro: ${e.message}</p>`;
  }
}
</script>
</body>
</html>
