<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reclamações de Horas — Portal do Trabalhador</title>
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/reclamacao-publica.css">
</head>
<body>

<div class="wrap">

  <!-- HEADER -->
  <div class="pub-header">
    <div class="pub-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="4" width="18" height="16" rx="2"/>
        <path d="M3 10h18M8 2v4M16 2v4"/>
        <circle cx="8" cy="15" r="1" fill="currentColor" stroke="none"/>
        <circle cx="12" cy="15" r="1" fill="currentColor" stroke="none"/>
        <circle cx="16" cy="15" r="1" fill="currentColor" stroke="none"/>
      </svg>
    </div>
    <div class="pub-title">Reclamações de Horas</div>
    <div class="pub-sub">Portal do Trabalhador</div>
  </div>

  <!-- ══ VISTA 1: ENTRADA ══ -->
  <div class="vista active" id="vistaEntrada">
    <div class="card">
      <div class="section-label">Identificação</div>
      <div id="alertEntrada" class="alert"></div>
      <div id="codigoReveal" class="codigo-reveal">
        <div class="codigo-reveal-title">O teu código de acesso</div>
        <span class="codigo-val-big" id="codigoValBig">—</span>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;">
          <button class="btn btn-sm" id="btnCopiarCodigoReveal" onclick="copiarCodigoReveal()">📋 Copiar código</button>
        </div>
        <div class="codigo-aviso">⚠ Guarda este código — precisarás dele para aceder novamente.</div>
        <div style="margin-top:14px;">
          <button class="btn btn-primary btn-sm" onclick="continuarAposRegisto()">Continuar →</button>
        </div>
      </div>
      <div id="formEntrada">
        <div class="field">
          <label class="field-label">NIF<span class="req">*</span></label>
          <input type="text" class="form-input" id="inNif" placeholder="ex: 123456789" maxlength="9" autocomplete="off" inputmode="numeric">
        </div>
        <div class="field">
          <label class="field-label">Nº de colaborador<span class="req">*</span></label>
          <input type="text" class="form-input" id="inNumFunc" placeholder="ex: 12345" autocomplete="off">
        </div>
        <button class="btn btn-primary btn-block" onclick="entrarOuRegistar()">Entrar / Registar</button>
        <div class="or-divider">ou</div>
        <div class="section-label">Já tenho código</div>
        <div class="field">
          <label class="field-label">Código do portal</label>
          <input type="text" class="form-input" id="inCodigo" placeholder="ex: RH-4F2K9X" maxlength="9" autocomplete="off" style="text-transform:uppercase;letter-spacing:.1em;" oninput="this.value=this.value.toUpperCase()">
        </div>
        <button class="btn btn-secondary btn-block" onclick="entrarComCodigo()">Entrar com código</button>
      </div>
    </div>
  </div>

  <!-- ══ VISTA 2: LISTA ══ -->
  <div class="vista" id="vistaLista">
    <div class="lista-header">
      <div class="lista-header-info">
        <div class="lista-nome" id="listaNome">—</div>
        <div class="lista-codigo-row">
          Código: <span class="lista-codigo-val" id="listaCodigo">—</span>
          <button class="btn-copy" onclick="copiarCodigo()">Copiar</button>
        </div>
      </div>
      <button class="btn-nova-rec" onclick="mostrarVistaForm()">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v12M2 8h12"/></svg>
        Nova
      </button>
      <button class="btn-sair" onclick="sair()">Sair</button>
    </div>
    <div id="alertLista" class="alert"></div>
    <div class="rec-list" id="recList">
      <div style="padding:20px;text-align:center;font-size:11px;color:var(--muted);">A carregar…</div>
    </div>
  </div>

  <!-- ══ VISTA 3: NOVA RECLAMAÇÃO ══ -->
  <div class="vista" id="vistaForm">
    <div class="card">
      <div class="form-panel-header">
        <div class="form-panel-title">Nova Reclamação</div>
        <button class="btn btn-secondary btn-sm" onclick="mostrarVistaLista()">← Voltar</button>
      </div>
      <div id="alertForm" class="alert"></div>
      <div class="section-label">Dados do trabalhador</div>
      <div class="form-grid">
        <div>
          <label class="field-label">Nº de funcionário</label>
          <input type="text" class="form-input" id="fNumFunc" readonly>
        </div>
        <div>
          <label class="field-label">NIF</label>
          <input type="text" class="form-input" id="fNif" readonly>
        </div>
        <div class="full">
          <label class="field-label">Nome completo<span class="req">*</span></label>
          <input type="text" class="form-input" id="fNome" placeholder="ex: João Silva" autocomplete="off">
        </div>
        <div>
          <label class="field-label">Categoria profissional</label>
          <input type="text" class="form-input" id="fCategoria" placeholder="ex: Operador de armazém" autocomplete="off">
        </div>
        <div class="full">
          <label class="field-label">Empresa utilizadora<span class="req">*</span></label>
          <input type="text" class="form-input" id="fEmpresa" placeholder="ex: Empresa ABC Lda" autocomplete="off">
        </div>
        <div class="full">
          <label class="field-label">Escritório</label>
          <select class="form-select" id="fEscritorio"><option value="">— Selecionar —</option></select>
        </div>
      </div>

      <div class="divider"></div>
      <div class="section-label">Períodos reclamados<span class="req">*</span></div>
      <div class="periodos-wrap" id="periodosWrap"></div>
      <button class="btn-add-periodo" onclick="adicionarPeriodo()">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v12M2 8h12"/></svg>
        Adicionar período
      </button>

      <div class="divider"></div>
      <div class="field">
        <label class="field-label">Notas</label>
        <textarea class="form-textarea" id="fNotas" placeholder="Descreve a situação com o maior detalhe possível…"></textarea>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px;">
        <button class="btn btn-secondary" onclick="mostrarVistaLista()">Cancelar</button>
        <button class="btn btn-primary" onclick="submitReclamacao()">Submeter Reclamação</button>
      </div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/reclamacao-publica.js"></script>
</body>
</html>
