<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comunicados Internos</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Manrope:wght@600;700;800&display=swap');
:root {
  --bg:#f4f4f6; --surface:#fff; --surface2:#f7f7f9; --border:#e2e2e8;
  --text:#1a1a22; --muted:#8888a0; --accent:#2563eb;
  --green:#16a34a; --green-bg:#f0fdf4; --green-border:#bbf7d0;
  --blue:#2563eb;  --blue-bg:#eff6ff;  --blue-border:#bfdbfe;
  --red:#dc2626;   --red-bg:#fef2f2;   --red-border:#fecaca;
  --amber:#d97706; --amber-bg:#fffbeb; --amber-border:#fde68a;
  --purple:#7c3aed; --purple-bg:#f5f3ff; --purple-border:#ddd6fe;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;}
.page{max-width:900px;margin:0 auto;padding:32px 20px;}
h1{font-family:'Manrope',sans-serif;font-weight:800;font-size:clamp(20px,2.5vw,28px);letter-spacing:-.03em;margin-bottom:4px;}
.subtitle{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:28px;}
.header-top{display:flex;align-items:baseline;gap:16px;margin-bottom:20px;}
.header-top h1{margin-bottom:0;}
#syncStatus{font-size:10px;color:var(--muted);letter-spacing:.05em;margin-left:auto;}
.stats-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.stat-chip{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 14px;display:flex;flex-direction:column;gap:1px;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.stat-val{font-family:'Manrope',sans-serif;font-size:18px;font-weight:800;letter-spacing:-.03em;}
.stat-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
.stat-chip.s-total .stat-val{color:var(--text);}
.stat-chip.s-geral .stat-val{color:var(--blue);}
.stat-chip.s-urgente .stat-val{color:var(--red);}
.stat-chip.s-info .stat-val{color:var(--purple);}
/* admin: botão novo comunicado */
.btn-novo{background:var(--text);color:#fff;border:none;font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.07em;padding:7px 16px;border-radius:20px;cursor:pointer;display:none;align-items:center;gap:6px;transition:opacity .15s;margin-left:auto;}
.btn-novo.show{display:flex;}
.btn-novo:hover{opacity:.82;}
.form-panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px 26px;margin-bottom:20px;box-shadow:0 1px 6px rgba(0,0,0,.06);display:none;}
.form-panel.open{display:block;}
.panel-title{font-family:'Manrope',sans-serif;font-size:13px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:600px){.form-grid{grid-template-columns:1fr;}}
.form-grid .full{grid-column:1/-1;}
.field-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;display:block;}
.form-input,.form-select,.form-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:11px;padding:8px 10px;border-radius:6px;outline:none;transition:border-color .15s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
.form-input::placeholder,.form-textarea::placeholder{color:#bbb;}
.form-textarea{resize:vertical;min-height:80px;line-height:1.6;}
.tipo-row{display:flex;gap:6px;}
.tipo-pill{flex:1;padding:7px 4px;border:1px solid var(--border);background:transparent;font-family:'DM Mono',monospace;font-size:10px;border-radius:6px;cursor:pointer;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;transition:all .15s;text-align:center;}
.tipo-pill[data-t="geral"].sel{background:var(--blue-bg);border-color:var(--blue);color:var(--blue);}
.tipo-pill[data-t="urgente"].sel{background:var(--red-bg);border-color:var(--red);color:var(--red);}
.tipo-pill[data-t="info"].sel{background:var(--purple-bg);border-color:var(--purple);color:var(--purple);}
.tipo-pill[data-t="aviso"].sel{background:var(--amber-bg);border-color:var(--amber);color:var(--amber);}
.tipo-pill:not(.sel):hover{border-color:#aaa;color:var(--text);}
.btn{border:none;border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;text-transform:uppercase;letter-spacing:.09em;transition:all .15s;padding:10px 18px;}
.btn:hover{opacity:.82;}
.btn-primary{background:var(--text);color:#fff;}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.controls-wrap{margin-bottom:16px;}
.controls-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.ctrl-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;min-width:52px;}
.filter-btn{padding:5px 11px;border:1px solid var(--border);background:transparent;font-family:'DM Mono',monospace;font-size:10px;border-radius:20px;cursor:pointer;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;transition:all .15s;white-space:nowrap;}
.filter-btn.active{background:var(--surface2);border-color:#888;color:var(--text);}
.count-badge{margin-left:auto;font-size:10px;color:var(--muted);white-space:nowrap;}
.comunicados-list{display:flex;flex-direction:column;gap:8px;}
.com-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:box-shadow .15s;position:relative;overflow:hidden;}
.com-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.09);}
.com-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:14px 0 0 14px;}
.com-card.tipo-geral::before{background:var(--blue);}
.com-card.tipo-urgente::before{background:var(--red);}
.com-card.tipo-info::before{background:var(--purple);}
.com-card.tipo-aviso::before{background:var(--amber);}
.com-card.arquivado{opacity:.6;}
.com-card.tipo-urgente{border-color:#fecaca;}
.com-header{display:grid;grid-template-columns:auto 1fr auto auto auto;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;user-select:none;}
.com-titulo{font-size:12px;font-weight:500;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
.com-titulo.arquivado{text-decoration:line-through;color:var(--muted);}
.com-dept-tag{font-size:9px;text-transform:uppercase;letter-spacing:.07em;padding:3px 8px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);white-space:nowrap;flex-shrink:0;}
.com-meta{font-size:10px;color:var(--muted);white-space:nowrap;flex-shrink:0;}
.chevron{width:14px;height:14px;color:var(--muted);flex-shrink:0;transition:transform .2s;}
.chevron.open{transform:rotate(180deg);}
.com-body{display:none;padding:0 16px 14px 16px;border-top:1px solid var(--border);}
.com-body.open{display:block;}
.com-text{font-size:11px;color:var(--muted);line-height:1.65;margin:12px 0 10px 0;white-space:pre-wrap;}
.com-footer-row{display:flex;align-items:center;gap:10px;font-size:10px;color:var(--muted);flex-wrap:wrap;}
.com-author{display:flex;align-items:center;gap:4px;}
.com-author svg{width:11px;height:11px;opacity:.5;}
/* admin actions */
.com-gestor{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.com-gestor.show{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.arquivo-btn{padding:5px 11px;border:1px solid var(--border);background:transparent;font-family:'DM Mono',monospace;font-size:10px;border-radius:20px;cursor:pointer;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;transition:all .15s;}
.arquivo-btn.active{background:var(--surface2);border-color:#888;color:var(--text);}
.icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:4px;color:#bbb;transition:color .1s;}
.icon-btn.del:hover{color:var(--red);}
.tipo-tag{font-size:9px;text-transform:uppercase;letter-spacing:.08em;padding:3px 8px;border-radius:10px;font-weight:500;flex-shrink:0;}
.tipo-tag.geral{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border);}
.tipo-tag.urgente{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.tipo-tag.info{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border);}
.tipo-tag.aviso{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
.urgente-banner{background:var(--red-bg);border:1px solid var(--red-border);border-radius:12px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:11px;color:var(--red);}
.urgente-banner svg{width:16px;height:16px;flex-shrink:0;}
.urgente-banner strong{font-family:'Manrope',sans-serif;font-weight:700;}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-state svg{width:36px;height:36px;opacity:.3;margin-bottom:12px;}
.empty-state p{font-size:12px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;font-size:11px;padding:10px 20px;border-radius:20px;opacity:0;transition:all .25s;pointer-events:none;z-index:600;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="page">
  <div class="header-top">
    <h1>Comunicados Internos</h1>
    <span id="syncStatus"></span>
  </div>
  <p class="subtitle" id="pageSubtitle">A carregar…</p>

  <div class="stats-row" id="statsBar">
    <div style="font-size:11px;color:var(--muted);">A carregar…</div>
    <!-- botão novo comunicado (só admin) -->
    <button class="btn-novo" id="btnNovoCom" onclick="toggleForm()">+ Novo comunicado</button>
  </div>

  <div id="urgenteBanner" style="display:none;"></div>

  <!-- FORM (só admin) -->
  <div class="form-panel" id="formPanel">
    <div class="panel-title">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 2H3a1 1 0 00-1 1v9a1 1 0 001 1h3l2 2 2-2h3a1 1 0 001-1V3a1 1 0 00-1-1z"/></svg>
      Novo Comunicado
    </div>
    <div class="form-grid">
      <div class="full">
        <label class="field-label">Tipo</label>
        <div class="tipo-row" id="tipoRow">
          <button class="tipo-pill sel" data-t="geral" onclick="selTipo('geral')">📢 Geral</button>
          <button class="tipo-pill" data-t="urgente" onclick="selTipo('urgente')">🚨 Urgente</button>
          <button class="tipo-pill" data-t="info" onclick="selTipo('info')">ℹ️ Info</button>
          <button class="tipo-pill" data-t="aviso" onclick="selTipo('aviso')">⚠️ Aviso</button>
        </div>
      </div>
      <div class="full">
        <label class="field-label">Título *</label>
        <input type="text" class="form-input" id="fTitulo" placeholder="ex: Reunião de equipa — sexta às 10h" maxlength="120" autocomplete="off">
      </div>
      <div class="full">
        <label class="field-label">Mensagem *</label>
        <textarea class="form-textarea" id="fTexto" placeholder="Escreve aqui o conteúdo do comunicado…" maxlength="1000"></textarea>
      </div>
      <div>
        <label class="field-label">Autor</label>
        <input type="text" class="form-input" id="fAutor" placeholder="ex: Direcção" maxlength="60" autocomplete="off">
      </div>
      <div>
        <label class="field-label">Departamento (opcional)</label>
        <select class="form-select" id="fDept">
          <option value="">Todos os departamentos</option>
          <option>Contabilidade</option>
          <option>Payroll / RH</option>
          <option>Comercial</option>
          <option>Operações</option>
          <option>Direcção</option>
        </select>
      </div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:14px;">
      <button class="btn btn-secondary" onclick="toggleForm()">Cancelar</button>
      <button class="btn btn-primary" onclick="submitComunicado()">Publicar</button>
    </div>
  </div>

  <div class="controls-wrap">
    <div class="controls-row">
      <span class="ctrl-label">Filtrar:</span>
      <button class="filter-btn active" data-f="activos" onclick="setFilter('activos')">Activos</button>
      <button class="filter-btn" data-f="todos" onclick="setFilter('todos')">Todos</button>
      <button class="filter-btn" data-f="urgente" onclick="setFilter('urgente')">Urgentes</button>
      <button class="filter-btn" data-f="arquivado" onclick="setFilter('arquivado')">Arquivados</button>
      <select id="filterEscritorioCom" onchange="setFiltroEscritorioCom(this.value)" style="padding:5px 8px;border:1px solid var(--border);background:var(--surface2);font-family:'DM Mono',monospace;font-size:10px;border-radius:20px;color:var(--muted);outline:none;cursor:pointer;max-width:150px;">
        <option value="">Todos os escritórios</option>
        <option value="quarteira">Quarteira</option>
        <option value="albufeira">Albufeira</option>
        <option value="lisboa">Lisboa</option>
        <option value="porto">Porto</option>
      </select>
      <span class="count-badge" id="countBadge"></span>
    </div>
  </div>

  <div class="comunicados-list" id="comunicadosList"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyBbTDfCCC9o5oxMSMRsvCUC50Iu6L0aqT8",
  authDomain: "calendario-trabalho-39a6c.firebaseapp.com",
  projectId: "calendario-trabalho-39a6c",
  storageBucket: "calendario-trabalho-39a6c.firebasestorage.app",
  messagingSenderId: "596069405321",
  appId: "1:596069405321:web:275bb9da220206d3da6c58"
};
firebase.initializeApp(firebaseConfig);
</script>
<script src="auth.js"></script>
<script>
const db = firebase.firestore();
let col;
let comunicados = [], selTipoVal = 'geral', filterMode = 'activos';
const expandedIds = new Set();
let filtroEscritorio = '';
const TIPO_LABEL = { geral:'Geral', urgente:'Urgente', info:'Info', aviso:'Aviso' };
const TIPO_EMOJI = { geral:'📢', urgente:'🚨', info:'ℹ️', aviso:'⚠️' };

document.addEventListener('authReady', ({ detail }) => {
  window.renderNavbar('comunicados');
  const profile    = detail.profile;
  const isAdmin    = window.isAdmin();
  const escritorio = window.escritorioAtivo();

  // botão novo comunicado só para admin; preencher autor
  if (isAdmin) {
    document.getElementById('btnNovoCom').classList.add('show');
    if (profile) document.getElementById('fAutor').value = profile.nomeCompleto || profile.nome || '';
  }

  // filtro por defeito = escritório do utilizador
  const nomes = { quarteira:'Quarteira', albufeira:'Albufeira', lisboa:'Lisboa', porto:'Porto', '':'Todos os escritórios' };
  filtroEscritorio = isAdmin
    ? ((escritorio && escritorio !== 'todos') ? escritorio : '')
    : (profile ? (profile.escritorio || '') : '');

  // mostrar filtro de escritório para todos
  const feEl = document.getElementById('filterEscritorioCom');
  if (feEl) { feEl.style.display=''; if (filtroEscritorio) feEl.value = filtroEscritorio; }

  document.getElementById('pageSubtitle').textContent = nomes[filtroEscritorio] || 'Todos os escritórios';

  col = db.collection('comunicados');
  // carregar tudo, filtrar no cliente (para poder ver outros escritórios)
  let query = col.orderBy('criadoEm', 'desc');

  setStatus('A ligar…', '#f59e0b');
  query.onSnapshot(snap => {
    comunicados = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
    setStatus('✓ Sincronizado', '#16a34a');
    setTimeout(() => setStatus(''), 3000);
  }, err => { console.error(err); setStatus('Erro', '#dc2626'); });
});

function setStatus(msg, color) {
  const el = document.getElementById('syncStatus');
  if (el) { el.textContent = msg; el.style.color = color || 'var(--muted)'; }
}

function toggleForm() {
  document.getElementById('formPanel').classList.toggle('open');
}

async function submitComunicado() {
  const titulo = document.getElementById('fTitulo').value.trim();
  const texto  = document.getElementById('fTexto').value.trim();
  const autor  = document.getElementById('fAutor').value.trim() || 'Administração';
  const dept   = document.getElementById('fDept').value;
  if (!titulo) { toast('Preenche o título!'); return; }
  if (!texto)  { toast('Escreve a mensagem!'); return; }
  try {
    await col.add({
      titulo, texto, autor, dept,
      tipo: selTipoVal,
      arquivado: false,
      criadoEm: Date.now(),
      escritorio: window.userProfile ? window.userProfile.escritorio : '',
      criadoPor: window.currentUser ? window.currentUser.uid : ''
    });
    document.getElementById('fTitulo').value = '';
    document.getElementById('fTexto').value = '';
    selTipo('geral');
    toggleForm();
    toast('✓ Comunicado publicado!');
  } catch(e) { toast('Erro ao publicar.'); }
}

async function toggleArquivado(id, current) {
  try { await col.doc(id).update({ arquivado: !current }); } catch(e) { toast('Erro.'); }
}
async function deleteComunicado(id) {
  if (!confirm('Eliminar este comunicado?')) return;
  expandedIds.delete(id);
  try { await col.doc(id).delete(); toast('Eliminado.'); } catch(e) { toast('Erro.'); }
}

function getFiltered() {
  let out = comunicados;
  if (filtroEscritorio)           out = out.filter(c => c.escritorio === filtroEscritorio);
  if (filterMode === 'activos')   out = out.filter(c => !c.arquivado);
  if (filterMode === 'urgente')   out = out.filter(c => c.tipo === 'urgente' && !c.arquivado);
  if (filterMode === 'arquivado') out = out.filter(c => c.arquivado);
  return out;
}
function setFilter(mode) { filterMode=mode; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.f===mode)); renderList(); }

function render() { renderStats(); renderUrgenteBanner(); renderList(); }

function renderStats() {
  const total=comunicados.filter(c=>!c.arquivado).length;
  const gerais=comunicados.filter(c=>c.tipo==='geral'&&!c.arquivado).length;
  const urg=comunicados.filter(c=>c.tipo==='urgente'&&!c.arquivado).length;
  const infos=comunicados.filter(c=>(c.tipo==='info'||c.tipo==='aviso')&&!c.arquivado).length;
  const btnNovo = document.getElementById('btnNovoCom');
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-chip s-total"><span class="stat-val">${total}</span><span class="stat-lbl">Activos</span></div>
    <div class="stat-chip s-geral"><span class="stat-val">${gerais}</span><span class="stat-lbl">Gerais</span></div>
    <div class="stat-chip s-urgente"><span class="stat-val">${urg}</span><span class="stat-lbl">Urgentes</span></div>
    <div class="stat-chip s-info"><span class="stat-val">${infos}</span><span class="stat-lbl">Info/Aviso</span></div>`;
  document.getElementById('statsBar').appendChild(btnNovo);
}

function renderUrgenteBanner() {
  const banner = document.getElementById('urgenteBanner');
  const urgentes = comunicados.filter(c=>c.tipo==='urgente'&&!c.arquivado);
  if (!urgentes.length) { banner.style.display='none'; return; }
  banner.style.display='flex'; banner.style.flexDirection='column'; banner.style.gap='8px';
  banner.innerHTML=urgentes.map(u=>`
    <div class="urgente-banner">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2L1.5 13h13L8 2z"/><path d="M8 7v3M8 11.5v.5"/></svg>
      <div><strong>${escHtml(u.titulo)}</strong> — ${escHtml(u.autor||'')} · ${fmtShort(u.criadoEm)}</div>
    </div>`).join('');
}

function renderList() {
  const container = document.getElementById('comunicadosList');
  const filtered = getFiltered();
  const isAdmin = window.isAdmin && window.isAdmin();
  document.getElementById('countBadge').textContent=filtered.length+' comunicado'+(filtered.length!==1?'s':'');
  if (!filtered.length) { container.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><p>Nenhum comunicado encontrado.</p></div>'; return; }
  container.innerHTML='';
  filtered.forEach(com=>{
    const isOpen=expandedIds.has(com.id), isArq=com.arquivado;
    const card=document.createElement('div');
    card.className=`com-card tipo-${com.tipo}${isArq?' arquivado':''}`;
    card.innerHTML=`
      <div class="com-header" onclick="toggleCard('${com.id}')">
        <span class="tipo-tag ${com.tipo}">${TIPO_EMOJI[com.tipo]||''} ${TIPO_LABEL[com.tipo]||com.tipo}</span>
        <div class="com-titulo${isArq?' arquivado':''}">${escHtml(com.titulo)}</div>
        ${com.dept?`<span class="com-dept-tag">${escHtml(com.dept)}</span>`:''}
        <div class="com-meta">${fmtShort(com.criadoEm)}</div>
        <svg class="chevron ${isOpen?'open':''}" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6l4 4 4-4"/></svg>
      </div>
      <div class="com-body ${isOpen?'open':''}">
        <div class="com-text">${escHtml(com.texto)}</div>
        <div class="com-footer-row">
          <span class="com-author"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="6" r="2.5"/><path d="M3 13c0-2.5 2.2-4.5 5-4.5s5 2 5 4.5"/></svg>${escHtml(com.autor||'—')}</span>
          <span style="opacity:.7;">${fmtDateFull(com.criadoEm)}</span>
        </div>
        <div class="com-gestor ${isAdmin?'show':''}">
          <button class="arquivo-btn ${isArq?'active':''}" onclick="event.stopPropagation();toggleArquivado('${com.id}',${isArq})">${isArq?'↩ Restaurar':'📁 Arquivar'}</button>
          <button class="icon-btn del" onclick="event.stopPropagation();deleteComunicado('${com.id}')">🗑</button>
        </div>
      </div>`;
    container.appendChild(card);
  });
}

function setFiltroEscritorioCom(val) {
  filtroEscritorio = val;
  const nomes = { quarteira:'Quarteira', albufeira:'Albufeira', lisboa:'Lisboa', porto:'Porto', '':'Todos os escritórios' };
  document.getElementById('pageSubtitle').textContent = nomes[val] || 'Todos os escritórios';
  renderList();
}
function toggleCard(id) { if(expandedIds.has(id)) expandedIds.delete(id); else expandedIds.add(id); renderList(); }
function selTipo(t) { selTipoVal=t; document.querySelectorAll('.tipo-pill').forEach(b=>b.classList.toggle('sel',b.dataset.t===t)); }
function escHtml(str) { if(!str) return ''; return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtShort(ts) { if(!ts) return ''; const diff=Date.now()-ts; if(diff<60000) return 'agora mesmo'; if(diff<3600000) return Math.floor(diff/60000)+' min atrás'; if(diff<86400000) return Math.floor(diff/3600000)+'h atrás'; const d=new Date(ts); return d.toLocaleDateString('pt-PT',{day:'2-digit',month:'short'}); }
function fmtDateFull(ts) { if(!ts) return ''; const d=new Date(ts); return d.toLocaleDateString('pt-PT',{day:'2-digit',month:'long',year:'numeric'})+' às '+d.toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'}); }
function toast(msg) { const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2800); }
</script>
</body>
</html>
